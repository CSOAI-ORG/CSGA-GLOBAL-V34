name: Fix Extract - Get ALL Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V34
        uses: actions/checkout@v4

      - name: Remove wrongly-placed image files at root
        run: |
          echo "Removing image files incorrectly placed at root level..."
          rm -f *.jpg *.png 2>/dev/null || true
          echo "Cleaned up root-level image files"

      - name: Download ZIP from V33
        run: |
          curl -L -o site.zip "https://github.com/CSOAI-ORG/CSGA-GLOBAL-V33/raw/main/Kimi_Agent_Deployment_v34.zip"
          ls -la site.zip

      - name: Extract ALL files properly
        run: |
          mkdir extracted
          unzip site.zip -d extracted
          echo "=== Contents of extracted/ ==="
          ls -la extracted/
          echo "=== Copying ALL files unconditionally ==="
          cp -r extracted/* . 2>/dev/null || true
          cp -r extracted/.* . 2>/dev/null || true
          rm -rf extracted site.zip
          echo "=== Removing .github to self-delete workflow ==="
          rm -rf .github
          echo "=== Final repo contents ==="
          ls -la

      - name: Commit all website files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix: Add ALL CSGA Global website files (HTML, CSS, JS, images)"
          git push
