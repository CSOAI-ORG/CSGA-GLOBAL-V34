name: Audit Fixes - SEO and Routing
on:
  workflow_dispatch:

jobs:
  audit-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create robots.txt
        run: |
          cat > robots.txt << 'ROBOTSEOF'
          User-agent: *
          Allow: /

          Sitemap: https://csga-global-v34.vercel.app/sitemap.xml
          ROBOTSEOF

      - name: Create sitemap.xml
        run: |
          cat > sitemap.xml << 'SITEMAPEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
            <url>
              <loc>https://csga-global-v34.vercel.app/</loc>
              <priority>1.0</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/about.html</loc>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/contact.html</loc>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/council.html</loc>
              <priority>0.8</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/education.html</loc>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/events.html</loc>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/career-pathways.html</loc>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/cobol-bridge.html</loc>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/csoai.html</loc>
              <priority>0.7</priority>
            </url>
            <url>
              <loc>https://csga-global-v34.vercel.app/dashboard.html</loc>
              <priority>0.6</priority>
            </url>
          </urlset>
          SITEMAPEOF

      - name: Create vercel.json for clean URLs and custom 404
        run: |
          cat > vercel.json << 'VERCELEOF'
          {
            "cleanUrls": true,
            "trailingSlash": false
          }
          VERCELEOF

      - name: Create custom 404 page
        run: |
          cat > 404.html << 'PAGE404EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Page Not Found | CSGA Global</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <script>
              tailwind.config = {
                theme: {
                  extend: {
                    colors: {
                      'csga-dark': '#0B0F17',
                      'csga-cyan': '#2EE9F6',
                      'csga-text': '#F2F5FA',
                      'csga-text-secondary': '#A7B1C6'
                    }
                  }
                }
              }
            </script>
            <link rel="preconnect" href="https://fonts.googleapis.com" />
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
            <style>
              body { font-family: 'Inter', sans-serif; }
            </style>
          </head>
          <body class="bg-csga-dark min-h-screen flex items-center justify-center">
            <div class="text-center px-6">
              <h1 class="text-8xl font-bold text-csga-cyan mb-4">404</h1>
              <h2 class="text-3xl font-semibold text-csga-text mb-4">Page Not Found</h2>
              <p class="text-csga-text-secondary text-lg mb-8 max-w-md mx-auto">
                The page you are looking for might have been moved, renamed, or is temporarily unavailable.
              </p>
              <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/" class="inline-block bg-csga-cyan text-csga-dark font-semibold px-8 py-3 rounded-lg hover:opacity-90 transition-opacity">
                  Return Home
                </a>
                <a href="/contact.html" class="inline-block border border-csga-cyan text-csga-cyan font-semibold px-8 py-3 rounded-lg hover:bg-csga-cyan hover:text-csga-dark transition-all">
                  Contact Us
                </a>
              </div>
              <p class="text-csga-text-secondary text-sm mt-12">&copy; 2025 CSGA Global. All rights reserved.</p>
            </div>
          </body>
          </html>
          PAGE404EOF

      - name: Commit all new files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add robots.txt sitemap.xml vercel.json 404.html
          git commit -m "Add robots.txt, sitemap.xml, vercel.json, and custom 404 page (audit fixes)"
          git push
