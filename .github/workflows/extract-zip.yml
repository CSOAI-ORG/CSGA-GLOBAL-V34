name: Extract ZIP from V33

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout V34
        uses: actions/checkout@v4

      - name: Download ZIP from V33
        run: |
          curl -L -o site.zip "https://github.com/CSOAI-ORG/CSGA-GLOBAL-V33/raw/main/Kimi_Agent_Deployment_v34.zip"
          ls -la site.zip

      - name: Extract and move files
        run: |
          mkdir extracted
          unzip site.zip -d extracted
          ls -la extracted/
          DIRS=$(find extracted -mindepth 1 -maxdepth 1 -type d)
          DIR_COUNT=$(echo "$DIRS" | wc -l)
          if [ "$DIR_COUNT" -eq 1 ] && [ -n "$DIRS" ]; then
            cp -r "$DIRS"/* . 2>/dev/null || true
            cp -r "$DIRS"/.* . 2>/dev/null || true
          else
            cp -r extracted/* . 2>/dev/null || true
          fi
          rm -rf extracted site.zip
          rm -rf .github
          ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add CSGA Global website files from V34 zip"
          git push
