name: Add Meta Tags and OG Tags
on:
  workflow_dispatch:

jobs:
  add-meta-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add meta descriptions and OG tags to all pages
        run: |
          python3 << 'PYEOF'
          import re

          SITE_URL = "https://csga-global-v34.vercel.app"
          OG_IMAGE = f"{SITE_URL}/images/csga-og-default.png"

          pages = {
              "index.html": {
                  "title": "CSGA Global | Cyber Security Global Alliance",
                  "desc": "CSGA Global unites cybersecurity leaders, AI governance experts, and policymakers to build cyber resilience and trust worldwide.",
                  "url": f"{SITE_URL}/"
              },
              "about.html": {
                  "title": "About CSGA | Cyber Security Global Alliance",
                  "desc": "Learn about CSGA Global mission to advance international cybersecurity cooperation, AI governance, and digital trust frameworks.",
                  "url": f"{SITE_URL}/about"
              },
              "contact.html": {
                  "title": "Contact CSGA Global | Get in Touch",
                  "desc": "Reach out to CSGA Global for partnership inquiries, membership information, and cybersecurity collaboration opportunities.",
                  "url": f"{SITE_URL}/contact"
              },
              "council.html": {
                  "title": "CSGA Advisory Council | Leadership and Governance",
                  "desc": "Meet the CSGA Global Advisory Council providing strategic direction on cybersecurity policy, AI ethics, and international digital security.",
                  "url": f"{SITE_URL}/council"
              },
              "education.html": {
                  "title": "Cybersecurity Education | CSGA Global Training Programs",
                  "desc": "Explore CSGA Global education initiatives including cybersecurity training, certification pathways, and professional development programs.",
                  "url": f"{SITE_URL}/education"
              },
              "events.html": {
                  "title": "Events | CSGA Global Conferences and Summits",
                  "desc": "Discover upcoming CSGA Global events, cybersecurity summits, AI governance conferences, and networking opportunities.",
                  "url": f"{SITE_URL}/events"
              },
              "career-pathways.html": {
                  "title": "Cybersecurity Career Pathways | CSGA Global",
                  "desc": "Navigate your cybersecurity career with CSGA Global career pathways, mentorship programs, and professional development resources.",
                  "url": f"{SITE_URL}/career-pathways"
              },
              "cobol-bridge.html": {
                  "title": "COBOL Bridge | AI-Powered Legacy Modernization",
                  "desc": "COBOL Bridge by CSGA Global offers AI-powered tools for modernizing legacy COBOL systems with secure, scalable migration solutions.",
                  "url": f"{SITE_URL}/cobol-bridge"
              },
              "csoai.html": {
                  "title": "CSOAI | Chief Security Officer AI Platform",
                  "desc": "CSOAI provides AI-driven cybersecurity intelligence, threat analysis, and security operations tools for enterprise security leaders.",
                  "url": f"{SITE_URL}/csoai"
              },
              "dashboard.html": {
                  "title": "Dashboard | CSGA Global Platform Tools",
                  "desc": "Access CSGA Global suite of cybersecurity tools, analytics dashboards, and AI-powered security management platforms.",
                  "url": f"{SITE_URL}/dashboard"
              }
          }

          for filename, meta in pages.items():
              try:
                  with open(filename, "r") as f:
                      content = f.read()
              except FileNotFoundError:
                  print(f"File not found: {filename}")
                  continue

              if "og:title" in content:
                  print(f"Skipping {filename} - OG tags already present")
                  continue

              meta_block = f'''    <meta name="description" content="{meta['desc']}">

              <!-- Open Graph / Social Media -->
              <meta property="og:type" content="website">
              <meta property="og:url" content="{meta['url']}">
              <meta property="og:title" content="{meta['title']}">
              <meta property="og:description" content="{meta['desc']}">
              <meta property="og:image" content="{OG_IMAGE}">
              <meta property="og:site_name" content="CSGA Global">

              <!-- Twitter Card -->
              <meta name="twitter:card" content="summary_large_image">
              <meta name="twitter:title" content="{meta['title']}">
              <meta name="twitter:description" content="{meta['desc']}">
              <meta name="twitter:image" content="{OG_IMAGE}">'''

              # Fix indentation - use 4 spaces
              lines = meta_block.split("\n")
              fixed_lines = []
              for line in lines:
                  fixed_lines.append(line.strip() if line.strip() else "")
              meta_block = "\n".join(["    " + l if l else "" for l in fixed_lines])

              # Insert after viewport meta tag
              pattern = r'(<meta name="viewport"[^>]*>)'
              replacement = r'\1\n' + meta_block
              new_content = re.sub(pattern, replacement, content, count=1)

              if new_content != content:
                  with open(filename, "w") as f:
                      f.write(new_content)
                  print(f"Added meta tags to {filename}")
              else:
                  print(f"No viewport meta found in {filename}")
          PYEOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add meta descriptions, Open Graph, and Twitter Card tags to all pages"
          git push
